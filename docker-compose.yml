services:
  valheim:
    image: mbround18/valheim:3
    env_file:
      - env
    environment:
      PORT: 2456
      PUBLIC: 0
      NAME: "RockandStone"
      PASSWORD: "trees"
      TZ: "America/Denver"
      WORLD: "RockandStone"
      AUTO_UPDATE: 1
      UPDATE_ON_START: 0
      AUTO_UPDATE_SCHEDULE: "0 1 * * *"
      AUTO_UPDATE_PAUSE_WITH_PLAYER: 1
      AUTO_BACKUP: 1
      AUTO_BACKUP_ON_UPDATE: 1
      AUTO_BACKUP_SCHEDULE: 0 */3 * * *
      AUTO_BACKUP_DAYS_TO_LIVE: 30
      AUTO_BACKUP_PAUSE_WITH_NO_PLAYERS: 1
      TYPE: BepInEx
      MODS: denikson-BepInExPack_Valheim-5.4.2333
        Roses-SmarterContainers-1.7.0
        ishid4-BetterArchery-1.9.82
        Tekla-AutoRepair-5.4.1602
        Advize-PlantEverything-1.20.0
        BetterUI_ForeverMaintained-BetterUI_ForeverMaintained-2.5.9
        Grizzzly-CraftFromContainers-3.8.1
        RandyKnapp-ImprovedBuildHud-1.0.8
        bdew-QuickConnect-1.7.0
        RustyMods-Seasonality-3.8.0
        TastyChickenLegs-TimedTorchesStayLit-1.3.9
        ValheimModding-YamlDotNet-16.3.1
        #  Nextek-SpeedyPaths-1.0.9
    build:
      context: .
      dockerfile: ./Dockerfile
      target: valheim
    ports:
      - "2456:2456/udp"
      - "2457:2457/udp"
      - "2458:2458/udp"
    volumes:
      - ./main/saves:/home/steam/.config/unity3d/IronGate/Valheim
      - ./main/server:/home/steam/valheim
      - ./main/backups:/home/steam/backups
    restart: unless-stopped

  hellheim:
    image: mbround18/valheim:3
    env_file:
      - env
    environment:
      PORT: 2456
      PUBLIC: 0
      NAME: "Hellheim"
      PASSWORD: "trees"
      TZ: "America/Denver"
      WORLD: "Hellheim"
      AUTO_UPDATE: 1
      UPDATE_ON_START: 0
      AUTO_UPDATE_SCHEDULE: "0 1 * * *"
      AUTO_UPDATE_PAUSE_WITH_PLAYER: 1
      AUTO_BACKUP: 1
      AUTO_BACKUP_ON_UPDATE: 1
      AUTO_BACKUP_SCHEDULE: 0 */3 * * *
      AUTO_BACKUP_DAYS_TO_LIVE: 30
      AUTO_BACKUP_PAUSE_WITH_NO_PLAYERS: 1
      TYPE: BepInEx
      MODS: denikson-BepInExPack_Valheim-5.4.2333
        Roses-SmarterContainers-1.7.0
        ishid4-BetterArchery-1.9.82
        Tekla-AutoRepair-5.4.1602
        Advize-PlantEverything-1.20.0
        BetterUI_ForeverMaintained-BetterUI_ForeverMaintained-2.5.9
        Grizzzly-CraftFromContainers-3.8.1
        RandyKnapp-ImprovedBuildHud-1.0.8
        bdew-QuickConnect-1.7.0
        RustyMods-Seasonality-3.8.0
        TastyChickenLegs-TimedTorchesStayLit-1.3.9
        ValheimModding-YamlDotNet-16.3.1
        #  Nextek-SpeedyPaths-1.0.9
    build:
      context: .
      dockerfile: ./Dockerfile
      target: hellheim
    ports:
      - "3456:2456/udp"
      - "3457:2457/udp"
      - "3458:2458/udp"
    volumes:
      - ./hell/saves:/home/steam/.config/unity3d/IronGate/Valheim
      - ./hell/server:/home/steam/valheim
      - ./hell/backups:/home/steam/backups
    restart: unless-stopped

